<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>New Order</title>

<!-- Font Awesome -->
<script src="https://kit.fontawesome.com/334881c12d.js" crossorigin="anonymous"></script>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    display:flex;
    background:#f5f6fa;
    height:100vh;
}

/* ===== SIDEBAR (SAME AS BEFORE) ===== */
.sidebar{
    width:260px;
    background:#072c21;
    color:white;
    padding:24px;
    display:flex;
    flex-direction:column;
}

.sidebar-brand{
    font-size:22px;
    font-weight:700;
    margin-bottom:40px;
    display:flex;
    align-items:center;
    gap:10px;
}

.sidebar-nav{
    list-style:none;
    flex-grow:1;
}

.sidebar-nav li{
    padding:12px 16px;
    border-radius:8px;
    cursor:pointer;
    margin-bottom:8px;
    transition:0.2s;
    color:#94a3b8;
    display:flex;
    align-items:center;
    gap:12px;
}

.sidebar-nav li:hover{
    background:#135c45;
    color:white;
}

.sidebar-nav li.active{
    background:#135c45;
    color:white;
}

.sidebar a{
    text-decoration:none;
}

.user-footer{
    margin-top:auto;
    border-top:1px solid #1e293b;
    padding-top:20px;
    display:flex;
    align-items:center;
    gap:12px;
}

.avatar{
    width:36px;
    height:36px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    color:white;
    font-weight:bold;
}

/* ===== MAIN ===== */
.main{
    flex:1;
    padding:20px;
}

.topbar{
    display:flex;
    justify-content:space-between;
    margin-bottom:20px;
}

.search{
    width:300px;
    padding:10px;
    border-radius:8px;
    border:1px solid #ddd;
}

.btn{
    background:#1abc9c;
    color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
}

/* ===== FORM ===== */
.form-container{
    width:650px;
    margin-top:30px;
    background:white;
    border-radius:15px;
    padding:20px;
    box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

.form-group{
    display:flex;
    flex-direction:column;
    gap:4px;
    margin-bottom:20px;
}

.form-group input,
.form-group select{
    height:35px;
    border-radius:8px;
    border:1px solid #ccc;
    padding:5px 10px;
}

.form-actions{
    display:flex;
    gap:10px;
}

.submit-btn{
    background:#135c45;
    color:white;
    border:none;
    padding:10px;
    border-radius:8px;
    width:150px;
    cursor:pointer;
}

.cancel-btn{
    background:#ccc;
    border:none;
    padding:10px;
    border-radius:8px;
    width:150px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- ===== SIDEBAR ===== -->
<div class="sidebar">

    <div class="sidebar-brand">
        <i class="fas fa-leaf"></i> Apex
    </div>

    <ul class="sidebar-nav">
        <a href="index.html">
            <li><i class="fas fa-chart-line"></i> Dashboard</li>
        </a>
        <a href="order.html">
            <li><i class="fas fa-shopping-bag"></i> Orders</li>
        </a>
        <a href="neworder.html">
            <li class="active"><i class="fas fa-plus-circle"></i> New Order</li>
        </a>
    </ul>

    <div class="user-footer">
        <div class="avatar" style="background:#27ae60;">AS</div>
        <div>
            <p style="font-size:14px;font-weight:600;">Aigars S.</p>
            <p style="font-size:12px;color:#94a3b8;">Admin</p>
        </div>
    </div>

</div>

<!-- ===== MAIN ===== -->
<div class="main">

    <div class="topbar">
        <input class="search" type="text" placeholder="Search Anything...">
        <button class="btn">+ New Order</button>
    </div>

    <div class="form-container">
        <h2 style="margin-bottom:10px;">Order Details</h2>
        <p style="color:gray;margin-bottom:20px;">
            Fill in information below to create a new order
        </p>

        <div class="form-group">
            <label>Customer Name</label>
            <input type="text" placeholder="eg Giriraj Thanvi">
        </div>

        <div class="form-group">
            <label>Customer Email</label>
            <input type="email" placeholder="eg Giriraj@gmail.com">
        </div>

        <div class="form-group">
            <label>Product Name</label>
            <input type="text" placeholder="eg Prodashboard License">
        </div>

        <div class="form-group">
            <label>Amount</label>
            <input type="text" placeholder="0.00">
        </div>

        <div class="form-group">
            <label>Status</label>
            <select>
                <option>Pending</option>
                <option>Processing</option>
                <option>Completed</option>
            </select>
        </div>

        <div class="form-actions">
            <button class="submit-btn">Create Order</button>
            <button class="cancel-btn">Cancel</button>
        </div>
    </div>

</div>

<script>
document.querySelector(".btn").addEventListener("click", function(){
    alert("Already on New Order page!");
});
</script>

</body>
</html>
