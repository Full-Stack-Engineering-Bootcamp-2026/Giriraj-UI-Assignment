        <style>
            *{
                margin:0;
                padding:0;
                box-sizing:border-box;
                font-family:Arial, Helvetica, sans-serif;
            }
            body{
                display:flex;
                background:#f5f6fa;
                height:100vh;
            }
            .sidebar{
                width:230px;
                background:#0b3d2e;
                color:white;
                padding:20px;
            }
            .sidebar h2{
                    margin-bottom:30px;
            }
            .sidebar ul{
                list-style:none; 
            }
            .sidebar ul li{
                padding:15px 10px;
                cursor:pointer;
                border-radius:8px;             
            }
            .sidebar ul li:hover{
                background:#135c45;
            }
            .main{
                flex:1;
                padding:20px;
            }
           .topbar{
            display:flex;
            justify-content:space-between;
            margin-bottom:20px;
           }
           .search{
            width:300px;
            padding:10px;
            border-radius:8px;
            border:1px solid #ddd;
           }
           .btn{
            background:#1abc9c;
            color:white;
            border:none;
            padding:10px 18px;
            border-radius:6px;
            cursor:pointer;
           }

           .cards{
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap:20px;
            margin-bottom:20px;
           }
           .card{
            background:white;
            padding:20px;
            border-radius: 10px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
           }
           .card h3{
            font-size:18px;
          margin-bottom:10px;
           }
           .card p{
            font-size:24px;
            font-weight:bold;
           }

           /*Table*/
           .table-container{
            background:white;
            padding:20px;
            border-radius: 10px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
            margin-bottom:10px;
           }
           table{
            width:100%;
            border-collapse:collapse;
           }
           th,td{
            padding:12px;
            border-bottom:1px solid #eee;
            text-align:left;
           }
           .status{
            padding:6px 10px;
            border-radius:6px;
            font-size:12px;
           }
           .completed{
            background:#2ecc71;
            color:white;
           }
           .pending{
             background:#f1c40f;
             color:white;
           } .processing{
             background:#34eb95;
             color:white;
           }
            .cancelled{
             background:#e74c3c;
             color:white;
           }
            .bottom-section{
            display:flex;
            flex-direction:row;
            /* gap:20px; */
            /* grid-template-columns:2f 1f;
            gap:20px;
            margin-top:20px; */
           }
           .activity{
            background:white;
            padding:20px;
            width:700px;
            border-radius: 10px;
            box-shadow:0 2px 6px rgba(0,0,0,0.1);
           }
           .activity-item{
            padding:10px o;
            border-bottom:1px solid #eee;
           }
          
        </style>
